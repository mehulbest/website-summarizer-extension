<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Website Summarizer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14,2 14,8 20,8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10,9 9,9 8,9"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-title">Summarizer</span>
          <span class="logo-by">by mehulbest</span>
        </div>
      </div>
      <div class="badge">AI</div>
    </header>

    <!-- Page Info -->
    <div class="page-info" id="pageInfo">
      <div class="page-domain" id="pageDomain">Loading page...</div>
    </div>

    <!-- Main Action -->
    <div class="action-area">
      <button class="summarize-btn" id="summarizeBtn">
        <span class="btn-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <span class="btn-text">Summarize This Page</span>
      </button>
    </div>

    <!-- Loading State -->
    <div class="loading-area" id="loadingArea" style="display:none;">
      <div class="loading-spinner">
        <div class="spinner-ring"></div>
      </div>
      <p class="loading-text">Reading page content...</p>
    </div>

    <!-- Summary Output -->
    <div class="summary-area" id="summaryArea" style="display:none;">
      <div class="summary-header">
        <span class="summary-label">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
          </svg>
          Summary
        </span>
        <button class="copy-btn" id="copyBtn" title="Copy to clipboard">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span id="copyLabel">Copy</span>
        </button>
      </div>
      <div class="summary-content" id="summaryContent"></div>
      <div class="summary-meta" id="summaryMeta"></div>
    </div>

    <!-- Error State -->
    <div class="error-area" id="errorArea" style="display:none;">
      <div class="error-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <p class="error-text" id="errorText">Something went wrong.</p>
      <button class="retry-btn" id="retryBtn">Try Again</button>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span>Open Source · MIT License</span>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
